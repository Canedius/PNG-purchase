<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Підтвердити отримання</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#eef2ff; color:#0f172a; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { width:100%; max-width:560px; background:#fff; border-radius:16px; padding:24px 26px;
            box-shadow:0 18px 40px -18px rgba(15,23,42,0.35); }
    .badge { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px;
             background:#e0e7ff; color:#312e81; font-size:12px; font-weight:700; letter-spacing:0.02em; }
    .title { margin:12px 0 6px; font-size:22px; font-weight:700; }
    .row { margin:6px 0; }
    .muted { color:#64748b; font-size:14px; margin:8px 0 0; }
    .btn-wrap { margin-top:18px; display:flex; justify-content:center; }
    .btn { min-width:220px; justify-content:center; display:inline-flex; align-items:center; gap:8px; padding:12px 18px; border:0; border-radius:12px;
           background:#22c55e; color:#fff; font-weight:700; cursor:pointer; box-shadow:0 10px 25px -12px rgba(34,197,94,0.6); }
    .btn:active { transform:translateY(1px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Підтвердження отримання</div>
    <div id="title" class="title"></div>
    <div id="info" class="row"></div>
    <div id="dateRow" class="row"></div>
    <div id="res" class="muted"></div>
    <div class="btn-wrap">
      <button class="btn" id="confirm">Підтвердити</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const status   = 'received'; // бек очікує, але користувачу не показуємо
    const supplier = params.get('supplier') || 'Невідомий постачальник';
    const orderDate = params.get('date') || params.get('orderDate') || '—';
    const ids = params.getAll('ids[]').length ? params.getAll('ids[]') :
                (params.get('ids') ? params.get('ids').split(',') : []);

    document.getElementById('title').textContent = supplier;
    document.getElementById('info').textContent  = `Позицій: ${ids.length}`;
    document.getElementById('dateRow').textContent = `Дата замовлення: ${orderDate}`;

    document.getElementById('confirm').onclick = async () => {
      const resBox = document.getElementById('res');
      resBox.textContent = 'Відправляю...';
      try {
        const resp = await fetch('https://primary-production-eeb3.up.railway.app/webhook/aaf5a6e4-f47b-45ce-8f6b-e8e3600a2ab5', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status, ids, supplier, orderDate })
        });
        const text = await resp.text();
        resBox.textContent = resp.ok ? 'Готово: ' + text : 'Помилка: ' + resp.status + ' ' + text;
      } catch (e) {
        resBox.textContent = 'Помилка: ' + e;
      }
    };
  </script>
</body>
</html>
