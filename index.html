<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Таблиця закупівлі</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='0' y1='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%23516AF6'/%3E%3Cstop offset='100%25' stop-color='%2366C4F2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect rx='12' ry='12' width='64' height='64' fill='url(%23g)'/%3E%3Cpath d='M18 22h28v4H18zM18 30h28v4H18zM18 38h16v4H18z' fill='%23fff'/%3E%3Ccircle cx='47' cy='40' r='6' fill='%23F59E0B'/%3E%3Cpath d='M44.5 40l2.2 2.5 3.8-4.5' stroke='%23fff' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css" />
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jsPDF + autoTable -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <!-- pdfMake vfs_fonts for Roboto (cyrillic) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.72/vfs_fonts.js"></script>
  <!-- QR code generator (two variants for надійності) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <!-- JsBarcode -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <div class="max-w-6xl mx-auto px-4 py-8 space-y-6">
    <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
      <div class="flex items-center gap-3">
        <img id="pageLogo" src="logo/PNG GROUP logo.avif" alt="Логотип" class="h-10 w-auto object-contain rounded" />
        <div>
          <h1 class="text-2xl font-semibold text-slate-900">Таблиця закупівлі</h1>
        </div>
      </div>
      <button id="refreshBtn"
        class="inline-flex items-center gap-2 rounded-lg bg-amber-500 px-4 py-2 text-white font-medium shadow hover:bg-amber-600 transition">
        Оновити дані з KeyCRM
      </button>
    </header>

    <div class="inline-flex rounded-full border border-slate-200 bg-white shadow-sm overflow-hidden">
      <button id="tabAll" class="tab-btn flex items-center gap-2 px-6 py-3 text-base font-semibold">
        <svg id="flameIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400">
          <path d="M12 3q1 4 4 6.5t3 5.5a1 1 0 0 1-14 0 5 5 0 0 1 1-3 1 1 0 0 0 5 0c0-2-1.5-3-1.5-5q0-2 2.5-4"></path>
        </svg>
        <span>Поточні</span>
      </button>
      <button id="tabOrdered" class="tab-btn flex items-center gap-2 px-6 py-3 text-base font-semibold">
        <svg id="clockIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" class="text-slate-400" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9"></circle>
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 7v5l3 2"/>
        </svg>
        <span>Замовлено</span>
      </button>
    </div>

    <div id="suppliersContainer" class="space-y-6"></div>
  </div>

  <iframe id="printFrame" style="position:fixed; right:0; bottom:0; width:0; height:0; border:0;" title="print-frame"></iframe>

  <!-- Modal одноразового товару -->
  <div id="oneOffModal" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center px-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl p-6 relative">
      <button id="oneOffClose" class="absolute right-3 top-3 text-slate-400 hover:text-slate-600">&times;</button>
      <h3 class="text-lg font-semibold mb-4">Додати одноразовий товар</h3>
      <div class="grid gap-3 md:grid-cols-2">
        <label class="text-sm space-y-1">
          <span class="text-xs text-slate-500">Номер замовлення*</span>
          <input id="mOrder" type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500" />
        </label>
        <div></div>
        <label class="text-sm space-y-1 md:col-span-2">
          <span class="text-xs text-slate-500">Назва товару*</span>
          <input id="mName" type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500" />
        </label>
        <label class="text-sm space-y-1">
          <span class="text-xs text-slate-500">Кількість</span>
          <input id="mQty" type="number" min="1" value="1" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500" />
        </label>
        <label class="text-sm space-y-1">
          <span class="text-xs text-slate-500">Артикул</span>
          <input id="mSku" type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500" />
        </label>
        <label class="text-sm space-y-1">
          <span class="text-xs text-slate-500">Фото (файл)</span>
          <input id="mPhotoFile" type="file" accept="image/*" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500" />
        </label>
      </div>
      <div id="mMsg" class="text-xs text-rose-600 mt-2"></div>
      <div class="flex items-center justify-end gap-3 mt-4">
        <button id="mCancel" class="px-4 py-2 rounded-lg border border-slate-300 text-slate-600 hover:bg-slate-50">Скасувати</button>
        <button id="mSave" class="px-4 py-2 rounded-lg bg-indigo-600 text-white font-semibold hover:bg-indigo-700 shadow">Додати</button>
      </div>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
